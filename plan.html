<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plan de Estudio - LinguaPath</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* Estilos de lectura para el contenido renderizado (tema oscuro). */
    .doc h1 { font-size: 2rem; font-weight: 800; margin: 1.5rem 0 .75rem; color: #c7d2fe; }
    .doc h2 { font-size: 1.4rem; font-weight: 700; margin: 1.75rem 0 .5rem; color: #e2e8f0; border-top: 1px solid #1e293b; padding-top: 1rem; }
    .doc h3 { font-size: 1.15rem; font-weight: 700; margin: 1.25rem 0 .4rem; color: #a5b4fc; }
    .doc p { margin: .5rem 0; color: #cbd5e1; line-height: 1.7; }
    .doc ul, .doc ol { margin: .5rem 0 .5rem 1.25rem; color: #cbd5e1; }
    .doc li { margin: .25rem 0; }
    .doc strong { color: #f1f5f9; }
    .doc code { background: #1e293b; color: #93c5fd; padding: .1rem .35rem; border-radius: .25rem; font-size: .85em; }
    .doc pre { background: #0b1220; border: 1px solid #1e293b; border-radius: .5rem; padding: 1rem; overflow:auto; margin: .75rem 0; }
    .doc pre code { background: none; color: #cbd5e1; }
    .doc blockquote { border-left: 3px solid #6366f1; padding: .25rem 0 .25rem 1rem; margin: 1rem 0; color: #94a3b8; font-style: italic; }
    .doc table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: .9rem; }
    .doc th, .doc td { border: 1px solid #1e293b; padding: .5rem .75rem; text-align: left; color: #cbd5e1; }
    .doc th { background: #111827; color: #e2e8f0; }
    .doc a { color: #818cf8; }
    .doc hr { border: 0; border-top: 1px solid #1e293b; margin: 1.5rem 0; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100">
  <header class="sticky top-0 bg-slate-900/90 backdrop-blur border-b border-slate-800 z-10">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
      <span class="font-extrabold bg-gradient-to-r from-indigo-400 to-fuchsia-400 bg-clip-text text-transparent">LinguaPath - Documentos</span>
      <button onclick="window.print()" class="text-sm bg-slate-800 border border-slate-700 rounded px-3 py-1.5 hover:bg-slate-700">Imprimir / PDF</button>
    </div>
  </header>
  <main id="doc" class="doc max-w-4xl mx-auto px-4 py-8">Cargando documento...</main>
  <script>
    // Visor generico: ?f=ruta.md  (por defecto, el plan de estudio).
    const params = new URLSearchParams(location.search);
    const file = params.get("f") || "docs/PLAN-DE-ESTUDIO.md";
    fetch(file)
      .then((r) => r.text())
      .then((md) => { document.getElementById("doc").innerHTML = marked.parse(md); })
      .catch((e) => { document.getElementById("doc").textContent = "No se pudo cargar el documento: " + e; });
  </script>
</body>
</html>
