{% extends "base.html" %}
{% block title %}Iniciar sesion - LinguaPath{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl p-8 shadow-sm border border-slate-200">
  <h1 class="text-2xl font-bold">Iniciar sesion</h1>

  {% if error %}
  <div role="alert" class="mt-4 bg-red-50 border border-red-200 text-red-800 text-sm rounded-md px-3 py-2">
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/login" class="mt-6 space-y-4">
    <div>
      <label for="email" class="block text-sm font-medium">Correo electronico</label>
      <input id="email" name="email" type="email" required
             class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 focus:outline focus:outline-2 focus:outline-indigo-600">
    </div>
    <div>
      <label for="password" class="block text-sm font-medium">Contrasena</label>
      <input id="password" name="password" type="password" required
             class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 focus:outline focus:outline-2 focus:outline-indigo-600">
    </div>
    <button type="submit"
            class="w-full bg-indigo-700 text-white font-semibold py-2.5 rounded-lg hover:bg-indigo-800 focus:outline focus:outline-2 focus:outline-indigo-900">
      Entrar
    </button>
  </form>

  <p class="mt-4 text-sm text-slate-600">
    No tienes cuenta? <a href="/register" class="text-indigo-700 underline">Registrate</a>
  </p>
</div>
{% endblock %}
