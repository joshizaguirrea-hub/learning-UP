{% extends "base.html" %}
{% block title %}Crear cuenta - LinguaPath{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl p-8 shadow-sm border border-slate-200">
  <h1 class="text-2xl font-bold">Crear cuenta</h1>
  <p class="text-slate-600 text-sm mt-1">Empieza a aprender ingles hoy.</p>

  {% if error %}
  <div role="alert" class="mt-4 bg-red-50 border border-red-200 text-red-800 text-sm rounded-md px-3 py-2">
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/register" class="mt-6 space-y-4">
    <div>
      <label for="full_name" class="block text-sm font-medium">Nombre completo</label>
      <input id="full_name" name="full_name" type="text" required
             class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 focus:outline focus:outline-2 focus:outline-indigo-600">
    </div>
    <div>
      <label for="email" class="block text-sm font-medium">Correo electronico</label>
      <input id="email" name="email" type="email" required
             class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 focus:outline focus:outline-2 focus:outline-indigo-600">
    </div>
    <div>
      <label for="password" class="block text-sm font-medium">Contrasena</label>
      <input id="password" name="password" type="password" required minlength="6"
             class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 focus:outline focus:outline-2 focus:outline-indigo-600">
    </div>
    <fieldset>
      <legend class="block text-sm font-medium">Quiero registrarme como</legend>
      <div class="mt-2 flex gap-4">
        <label class="flex items-center gap-2 text-sm">
          <input type="radio" name="role" value="student" checked> Estudiante
        </label>
        <label class="flex items-center gap-2 text-sm">
          <input type="radio" name="role" value="teacher"> Profesor
        </label>
      </div>
    </fieldset>
    <label class="flex items-start gap-2 text-sm text-slate-700">
      <input type="checkbox" name="is_adult" class="mt-1" required>
      <span>Confirmo que soy mayor de 18 anos.</span>
    </label>
    <button type="submit"
            class="w-full bg-indigo-700 text-white font-semibold py-2.5 rounded-lg hover:bg-indigo-800 focus:outline focus:outline-2 focus:outline-indigo-900">
      Crear cuenta
    </button>
  </form>

  <p class="mt-4 text-sm text-slate-600">
    Ya tienes cuenta? <a href="/login" class="text-indigo-700 underline">Inicia sesion</a>
  </p>
</div>
{% endblock %}
