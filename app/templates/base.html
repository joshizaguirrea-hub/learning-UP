<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Plataforma de Idiomas{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 flex flex-col">
  <header class="bg-indigo-700 text-white">
    <nav class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="text-xl font-bold tracking-tight">LinguaPath</a>
      <div class="flex items-center gap-4 text-sm">
        {% if user %}
          <span class="hidden sm:inline">Hola, {{ user.full_name }}</span>
          <a href="/logout" class="underline hover:no-underline focus:outline focus:outline-2 focus:outline-white rounded">Salir</a>
        {% else %}
          <a href="/login" class="underline hover:no-underline focus:outline focus:outline-2 focus:outline-white rounded">Iniciar sesion</a>
          <a href="/register" class="bg-white text-indigo-700 font-semibold px-3 py-1.5 rounded-md hover:bg-indigo-50 focus:outline focus:outline-2 focus:outline-white">Registrarme</a>
        {% endif %}
      </div>
    </nav>
  </header>

  <main class="flex-1 max-w-5xl w-full mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="bg-slate-800 text-slate-300 text-sm">
    <div class="max-w-5xl mx-auto px-4 py-4 text-center">
      LinguaPath (MVP) &middot; Aprende ingles a tu ritmo
    </div>
  </footer>
</body>
</html>
