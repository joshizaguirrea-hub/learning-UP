<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>LinguaPath - Aprende idiomas</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles/app.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 flex flex-col">
  <header class="bg-slate-900/80 backdrop-blur border-b border-slate-800 sticky top-0 z-10">
    <nav class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="#/" class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 to-fuchsia-400 bg-clip-text text-transparent">LinguaPath</a>
      <div id="session-slot" class="flex items-center gap-4 text-sm"></div>
    </nav>
  </header>

  <!-- Toda la app se renderiza aqui desde src/main.js -->
  <main id="app" class="flex-1 max-w-5xl w-full mx-auto px-4 py-8"></main>

  <footer class="border-t border-slate-800 text-slate-500 text-sm">
    <div class="max-w-5xl mx-auto px-4 py-4 text-center">
      LinguaPath (MVP) &middot; Aprende ingles a tu ritmo
    </div>
  </footer>

  <!-- Unico punto de entrada: ES Modules, sin build, sin cache-busting manual -->
  <script type="module" src="src/main.js"></script>
  <script>
    // Registro del Service Worker (PWA). No bloquea si falla.
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
